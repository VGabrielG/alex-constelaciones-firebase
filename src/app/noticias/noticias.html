<app-particles-background></app-particles-background>
<div class="noticias-container">
  <h1 class="main-title">Noticias</h1>
  <div class="noticias-grid">
    <div *ngFor="let noticia of noticias" class="noticia-card">
      <img [src]="noticia.imagen" alt="Imagen de la noticia" class="noticia-imagen">
      <p class="noticia-descripcion">{{ noticia.descripcion }}</p>
    </div>
  </div>
</div>
